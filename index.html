
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Ferramentas</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<h1>Controle de Ferramentas</h1>

<form id="tool-form">
  <input type="text" id="person" placeholder="Nome" required>
  <input type="text" id="builderNumber" placeholder="Nº Builder (opcional)">
  <input type="text" id="tool" placeholder="Ferramenta" required>
  <input type="number" id="quantity" placeholder="Quantidade" required>
  <input type="date" id="date" required>
  <textarea id="observation" placeholder="Observações"></textarea>

  <button type="submit">Registrar</button>
</form>

<input type="text" id="search" placeholder="Buscar nome ou Nº Builder">

<div class="buttons">
  <button onclick="exportarPDFCompleto()">Exportar PDF Completo</button>
  <button onclick="desfazerUltimaAcao()">Desfazer Última Ação</button>
</div>

<div id="requests"></div>

<script src="script.js"></script>

</body>
</html>
